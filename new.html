<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Flow - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; }
        body { font-family: 'Tajawal', sans-serif; transition: background 0.4s, color 0.4s; overflow-x: hidden; }
        
        body.dark { background-color: #0b0f1a; color: #e2e8f0; }
        body.light { background-color: #f3f4f6; color: #1e293b; }

        .card { border-radius: 28px; overflow: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .dark .card { background: #161e2d; border: 1px solid #2d3748; }
        .light .card { background: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        .media-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; }
        .media-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 100%; }
        .media-container::-webkit-scrollbar { display: none; }
        
        .media-item { flex: 0 0 100%; width: 100%; height: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .media-item img, .media-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        .dots-container { position: absolute; bottom: 15px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; z-index: 20; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { width: 18px; background: #fff; border-radius: 10px; }

        .drive-btn { position: absolute; top: 15px; left: 15px; z-index: 30; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 10px; border-radius: 14px; color: white; border: 1px solid rgba(255,255,255,0.1); }

        .occasion-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; padding: 5px 14px; border-radius: 10px; font-weight: 800; font-size: 11px; display: inline-flex; align-items: center; gap: 5px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }

        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 28px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.4s; z-index: 9999; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark pb-32">

    <div id="toast">تم النسخ ✅</div>

    <nav class="sticky top-0 z-50 p-4 flex justify-between items-center backdrop-blur-xl bg-inherit/70 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
            </div>
            <h1 class="font-black text-lg tracking-tight uppercase">Media Hub</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-gray-500/10 active:scale-90 transition"><i data-lucide="sun" id="themeIcon" class="text-amber-400"></i></button>
            <button onclick="fetchData()" class="p-3 rounded-2xl bg-indigo-500/10 text-indigo-500 active:scale-90 transition"><i data-lucide="refresh-cw"></i></button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4">
        <div id="viewSection" class="tab-content active space-y-8">
            <div id="contentContainer" class="grid grid-cols-1 gap-8"></div>
        </div>

        <div id="addSection" class="tab-content">
            <div class="card p-8 space-y-5">
                <h2 class="text-2xl font-black italic">POST SOMETHING</h2>
                <form id="postForm" class="space-y-4">
                    <input type="text" id="productName" placeholder="اسم المنتج/المنشور" class="w-full p-5 rounded-2xl bg-gray-500/5 border border-white/5 outline-none focus:ring-2 ring-indigo-500" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="date" class="p-5 rounded-2xl bg-gray-500/5 border border-white/5 outline-none" required>
                        <select id="contentType" class="p-5 rounded-2xl bg-gray-500/5 border border-white/5 outline-none font-bold">
                            <option>ريل</option><option>بوست</option><option>ستوري</option>
                        </select>
                    </div>
                    <input type="text" id="occasion" placeholder="مناسبة خاصة؟ (مثال: رمضان)" class="w-full p-5 rounded-2xl bg-gray-500/5 border border-white/5 outline-none">
                    <textarea id="captionDraft" placeholder="نص الكابشن..." class="w-full p-5 rounded-2xl bg-gray-500/5 border border-white/5 h-40 outline-none"></textarea>
                    <textarea id="mediaUrls" placeholder="روابط جوجل درايف (افصل بـ |||)" class="w-full p-4 rounded-2xl bg-gray-500/5 border border-white/5 h-24 outline-none text-xs"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-black p-5 rounded-2xl shadow-xl active:scale-95 transition uppercase tracking-widest">Send to Sheet</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbznTvtaErEUBZpYduZj02LhTyWZtSjNd-mPYityXOyBdoBrsNh0ukPn5wKpAIS4L6iE/exec';

        function extractId(u) {
            const m = u.match(/(?:id=|\/d\/|preview\/d\/)([\w-]{25,})/);
            return m ? m[1] : u.trim();
        }

        function getMediaMeta(u) {
            const id = extractId(u);
            return {
                id: id,
                preview: `https://drive.google.com/file/d/${id}/preview`,
                direct: `https://drive.google.com/file/d/${id}/view`
            };
        }

        function render(items) {
            const container = document.getElementById('contentContainer');
            container.innerHTML = items.map(item => {
                const urls = item.mediaUrls ? item.mediaUrls.split('|||').filter(x => x.trim()) : [];
                return `
                <div class="card shadow-2xl">
                    <div class="media-wrapper">
                        <div class="media-container">
                            ${urls.map(u => {
                                const m = getMediaMeta(u);
                                return `
                                <div class="media-item">
                                    <a href="${m.direct}" target="_blank" class="drive-btn">↗</a>
                                    <iframe src="${m.preview}" class="w-full h-full"></iframe>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        fetchData();
    </script>
</body>
</html>
